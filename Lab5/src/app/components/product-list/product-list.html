<section class="catalog">
  <div class="catalog-header">
    <h1 class="catalog-title">
      <span class="title-accent">Kaspi</span> Product Catalog
    </h1>
    <p class="catalog-subtitle">Лучшие товары по выгодным ценам</p>
  </div>

  <div class="categories">
    <button
      *ngFor="let cat of categories"
      class="cat-btn"
      [class.active]="cat.id === selectedCategoryId"
      (click)="selectCategory(cat.id)"
    >
      <span class="cat-icon">{{ cat.icon }}</span>
      {{ cat.name }}
    </button>
  </div>

  <div class="products-grid" *ngIf="products.length > 0; else empty">
    <app-product-item
      *ngFor="let product of products; trackBy: trackById"
      [product]="product"
    ></app-product-item>
  </div>

  <ng-template #empty>
    <div class="empty-state">
      <div class="empty-icon">📦</div>
      <p>Товары не найдены в этой категории</p>
    </div>
  </ng-template>
</section>
